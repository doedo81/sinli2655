<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌤️ 스마트 교실 스카이 대시보드 🌟</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --main-sky: #e3f2fd;
            --accent-blue: #0288d1;
            --dark-blue: #01579b;
            --chalk-white: #ffffff;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; } 
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; background-color: var(--main-sky); color: #333; margin: 0; padding: 10px; overflow-x: hidden; }

        /* 상단 바 */
        .top-header { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px 25px; border-radius: 20px; box-shadow: var(--shadow); margin-bottom: 15px; }
        .logo { font-size: 22px; font-weight: 800; color: var(--accent-blue); }
        .room-tag { background: var(--accent-blue); color: white; padding: 5px 15px; border-radius: 30px; font-size: 14px; font-weight: bold; }

        /* 탭 메뉴 */
        .tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .tab-btn { padding: 10px 25px; border: none; border-radius: 15px; cursor: pointer; background: white; color: #555; font-weight: bold; transition: 0.3s; box-shadow: var(--shadow); }
        .tab-btn.active { background: var(--accent-blue); color: white; transform: translateY(-3px); }

        /* 3분할 레이아웃 */
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr 1.2fr; gap: 15px; max-width: 1600px; margin: 0 auto; height: calc(100vh - 200px); min-height: 600px; }
        .column-card { background: white; border-radius: 25px; padding: 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; overflow: hidden; border-top: 6px solid var(--accent-blue); }
        
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid var(--main-sky); }
        .card-header i { color: var(--accent-blue); font-size: 20px; }
        .card-header h3 { margin: 0; font-size: 18px; color: var(--dark-blue); }

        /* 항목별 디자인 */
        .info-box { background: var(--main-sky); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .info-label { font-weight: bold; color: var(--accent-blue); font-size: 14px; margin-bottom: 8px; display: block; }
        .info-content { font-size: 17px; line-height: 1.6; white-space: pre-wrap; color: #333; }

        /* 시간표 전용 */
        .timetable-row { display: flex; padding: 8px 0; border-bottom: 1px dashed #bddaf5; align-items: center; }
        .tt-num { font-weight: bold; color: var(--accent-blue); min-width: 45px; }
        .tt-subject { font-weight: 600; min-width: 70px; color: #333; }
        .tt-goal { color: #666; font-size: 15px; flex: 1; }

        /* 타이머 위젯 (플로팅) */
        #timer-widget { position: fixed; bottom: 30px; right: 30px; z-index: 2000; }
        .timer-toggle-btn { width: 70px; height: 70px; background: var(--dark-blue); color: white; border-radius: 50%; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s; }
        .timer-toggle-btn:hover { transform: scale(1.1); }
        
        #timer-box { position: absolute; bottom: 85px; right: 0; background: white; padding: 20px; border-radius: 20px; box-shadow: var(--shadow); width: 280px; display: none; border: 3px solid var(--accent-blue); }
        .timer-display { font-size: 45px; font-weight: bold; color: var(--accent-blue); text-align: center; margin-bottom: 15px; }
        .timer-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 15px; }
        .timer-btn { padding: 8px; border: none; border-radius: 10px; background: var(--main-sky); cursor: pointer; font-size: 13px; }
        .timer-start { background: var(--accent-blue); color: white; grid-column: span 2; font-weight: bold; }

        /* 수정 모드 스타일 */
        .edit-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 3000; padding: 20px; }
        .edit-modal { background: white; max-width: 800px; margin: 0 auto; border-radius: 25px; padding: 30px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .edit-group { margin-bottom: 20px; }
        .edit-group label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--accent-blue); }
        .edit-input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid var(--main-sky); font-size: 16px; outline: none; }
        .edit-input:focus { border-color: var(--accent-blue); }

        /* 버튼류 */
        .btn-save { background: var(--accent-blue); color: white; border: none; padding: 12px 30px; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 16px; width: 100%; margin-top: 10px; }
        .btn-cancel { background: #eee; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; }

        /* 반응형 */
        @media (max-width: 1100px) {
            .dashboard-grid { grid-template-columns: 1fr; height: auto; overflow: visible; }
            .column-card { height: auto; min-height: unset; }
        }
    </style>
</head>
<body>

    <div class="top-header">
        <div class="logo">🌤️ SKY CLASS DASHBOARD</div>
        <div id="real-clock" style="font-size: 20px; font-weight: bold; color: var(--dark-blue);">12:46:48</div>
        <div class="room-tag" id="current-room-display">신리초 5학년 1반</div>
    </div>

    <div class="tab-container">
        <button class="tab-btn active" onclick="switchTab('board')"><i class="fa-solid fa-clipboard-list"></i> 오늘의 대시보드</button>
        <button class="tab-btn" onclick="location.href='#'"><i class="fa-solid fa-star"></i> 점수판</button>
        <button class="tab-btn" onclick="location.href='#'"><i class="fa-solid fa-dice"></i> 활동&뽑기</button>
        <button class="tab-btn" onclick="location.href='#'"><i class="fa-solid fa-book"></i> 과제관리</button>
    </div>

    <div id="board-tab" class="content-section active">
        <div style="text-align: right; max-width: 1600px; margin: 0 auto 10px auto; padding-right: 10px;">
            <button class="tab-btn" style="background: var(--dark-blue); color: white;" onclick="openEditModal()"><i class="fa-solid fa-pen"></i> 오늘 내용 수정/저장</button>
        </div>

        <div class="dashboard-grid">
            <div class="column-card">
                <div class="card-header"><i class="fa-solid fa-sun"></i><h3>오늘의 시작</h3></div>
                <div class="info-box" style="background: #fff9c4;">
                    <span class="info-label">📅 날짜 및 날씨</span>
                    <div class="info-content" id="view-date" style="font-weight: bold; font-size: 20px;"></div>
                </div>
                <div class="info-box">
                    <span class="info-label">⭐ 아침 자습</span>
                    <div class="info-content" id="view-morning"></div>
                </div>
                <div class="card-header" style="margin-top: 10px;"><i class="fa-solid fa-book-open"></i><h3>배움 시간표</h3></div>
                <div id="view-timetable" style="overflow-y: auto; flex: 1;">
                    </div>
            </div>

            <div class="column-card">
                <div class="card-header"><i class="fa-solid fa-user-check"></i><h3>오늘의 생활 도우미</h3></div>
                <div class="info-box" style="background: #e1f5fe; border: 2px solid var(--accent-blue);">
                    <span class="info-label">🧹 오늘의 당번</span>
                    <div class="info-content" id="view-duty-nums" style="font-size: 22px; font-weight: bold; color: var(--dark-blue);"></div>
                </div>
                <div class="info-box">
                    <span class="info-label">📋 당번이 할 일</span>
                    <div class="info-content" id="view-duty-tasks" style="font-size: 15px;"></div>
                </div>
                <div class="card-header" style="margin-top: 10px;"><i class="fa-solid fa-bullhorn"></i><h3>전달할 사항</h3></div>
                <div class="info-box" style="flex: 1; margin-bottom: 0;">
                    <div class="info-content" id="view-notices"></div>
                </div>
            </div>

            <div class="column-card">
                <div class="card-header"><i class="fa-solid fa-pen-nib"></i><h3>알림장 (꼭 적어가기)</h3></div>
                <div class="info-box" style="flex: 1; background: #f1f8e9; border: 2px solid #689f38;">
                    <div class="info-content" id="view-al-lim" style="font-size: 18px; color: #1b5e20;"></div>
                </div>
                <div class="card-header" style="margin-top: 15px;"><i class="fa-solid fa-shield-halved"></i><h3>안전 및 생활</h3></div>
                <div class="info-box" style="background: #fff3e0;">
                    <span class="info-label" style="color: #e65100;">❗️ 안전 수칙</span>
                    <div class="info-content" id="view-safety"></div>
                </div>
                <div class="info-box" style="margin-bottom: 0;">
                    <span class="info-label">🎂 축하해요 (생일)</span>
                    <div class="info-content" id="view-birthday"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="timer-widget">
        <div id="timer-box">
            <div class="timer-display" id="timer-display">00:00</div>
            <div class="timer-controls">
                <button class="timer-btn" onclick="setTimer(1)">1분</button>
                <button class="timer-btn" onclick="setTimer(3)">3분</button>
                <button class="timer-btn" onclick="setTimer(5)">5분</button>
                <button class="timer-btn timer-start" onclick="toggleTimer()" id="timer-toggle-btn">시작</button>
                <button class="timer-btn" onclick="setTimer(0)">리셋</button>
            </div>
            <input type="number" id="custom-timer-input" class="edit-input" style="padding:5px; font-size:14px;" placeholder="직접 분 입력">
        </div>
        <button class="timer-toggle-btn" onclick="toggleTimerBox()">
            <i class="fa-solid fa-stopwatch"></i>
        </button>
    </div>

    <div class="edit-overlay" id="edit-modal">
        <div class="edit-modal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h2 style="margin:0; color:var(--dark-blue);">✏️ 대시보드 데이터 관리</h2>
                <button class="btn-cancel" onclick="closeEditModal()">닫기</button>
            </div>
            <button class="btn-save" style="background:#9b59b6; margin-bottom:20px;" onclick="autoFillByDay()">🪄 요일별 기초 세팅 불러오기</button>
            
            <div class="edit-group"><label>오늘의 날짜/날씨</label><input type="text" id="be-date" class="edit-input"></div>
            <div class="edit-group"><label>⭐ 아침 자습</label><input type="text" id="be-morning" class="edit-input"></div>
            <div class="edit-group"><label>🧹 당번 번호</label><input type="text" id="be-duty-nums" class="edit-input"></div>
            <div class="edit-group"><label>📋 당번 할 일</label><textarea id="be-duty-tasks" class="edit-input" style="height:80px;"></textarea></div>
            <div class="edit-group"><label>📚 시간표 및 학습목표 (한 줄에 1교시씩)</label><textarea id="be-timetable" class="edit-input" style="height:150px;"></textarea></div>
            <div class="edit-group"><label>📢 안내 사항</label><textarea id="be-notices" class="edit-input" style="height:100px;"></textarea></div>
            <div class="edit-group"><label>📝 알림장</label><textarea id="be-al-lim" class="edit-input" style="height:150px;"></textarea></div>
            <div class="edit-group"><label>❗️ 안전 수칙</label><input type="text" id="be-safety" class="edit-input"></div>
            <div class="edit-group"><label>🎂 생일</label><input type="text" id="be-birthday" class="edit-input"></div>
            
            <button class="btn-save" onclick="saveDashboardData()">💾 서버에 저장하고 칠판 띄우기</button>
        </div>
    </div>

    <script>
        // ==========================================
        // ⚙️ 기초 세팅 (요일별 기본 내용)
        // ==========================================
        const dayDefaults = {
            "월": {
                morning: "주말 지낸 이야기 나누기 및 독서",
                safety: "복도에서 우측통행하며 사뿐사뿐 걷기",
                timetable: "1교시 국어 : 배울 내용 적기\n2교시 수학 : 학습 목표 적기\n3교시 영어 : \n4교시 과학 : \n5교시 과학 : \n6교시 체육 : "
            },
            "화": {
                morning: "영어 단어 깜빡이 및 연산 연습",
                safety: "모르는 사람 따라가지 않기",
                timetable: "1교시 국어 : \n2교시 국어 : \n3교시 수학 : \n4교시 사회 : \n5교시 음악 : \n6교시 미술 : "
            },
            "수": {
                morning: "온라인 독서 기록장 작성",
                safety: "스마트폰 보며 걷지 않기",
                timetable: "1교시 창체 : \n2교시 창체 : \n3교시 과학 : \n4교시 과학 : \n5교시 음악 : "
            },
            "목": {
                morning: "아침 체육 활동 (운동장/강당)",
                safety: "친구와 고운 말 사용하기",
                timetable: "1교시 수학 : \n2교시 사회 : \n3교시 국어 : \n4교시 체육 : \n5교시 영어 : \n6교시 실과 : "
            },
            "금": {
                morning: "교실 대청소 및 한 주 정리",
                safety: "자전거 탈 때 보호장구 착용하기",
                timetable: "1교시 국어 : \n2교시 수학 : \n3교시 사회 : \n4교시 실과 : \n5교시 실과 : \n6교시 창체 : "
            }
        };

        const defaultDutyTask = "1. 창문 열고 닫기 (아침/하교 시)\n2. 교실 앞뒤 쓸기\n3. 공기청정기 켜기\n4. 연필깎이 통 비우기\n5. 선생님 도우미";

        // ==========================================
        // 🚨 파이어베이스 연동 (선생님 주소)
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyCrEfpzVS1YvORiM4HYRCryytj6Y-kG2fI",
          authDomain: "classscore-sinli.firebaseapp.com",
          databaseURL: "https://classscore-sinli-default-rtdb.firebaseio.com",
          projectId: "classscore-sinli",
          storageBucket: "classscore-sinli.firebasestorage.app",
          messagingSenderId: "566976944507",
          appId: "1:566976944507:web:84f7518d7fce10035dc5de"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database(); 

        let currentRoom = localStorage.getItem('classRoomName') || "아산초5학년1반";
        let boardRef = db.ref('rooms/' + currentRoom + '/skyDashboard');

        // ⏰ 시계 및 초기화
        window.onload = () => {
            document.getElementById('current-room-display').innerText = currentRoom;
            setInterval(updateClock, 1000);
            startFirebaseListeners();
        };

        function updateClock() {
            const now = new Date();
            document.getElementById('real-clock').innerText = now.toLocaleTimeString('ko-KR', {hour12: false});
        }

        function switchTab(tab) {
            // 기존 페이지들과 연동 필요시 여기에 링크
            if(tab !== 'board') alert('해당 기능은 기존 탭 기능을 유지하여 연동해 주세요!');
        }

        // 📡 실시간 연동
        function startFirebaseListeners() {
            boardRef.on('value', snap => {
                const data = snap.val() || {};
                updateView(data);
            });
        }

        // 👀 화면 업데이트
        function updateView(data) {
            document.getElementById('view-date').innerText = data.date || "날짜를 입력해주세요";
            document.getElementById('view-morning').innerText = data.morning || "";
            document.getElementById('view-duty-nums').innerText = data.dutyNums || "";
            document.getElementById('view-duty-tasks').innerText = data.dutyTasks || defaultDutyTask;
            document.getElementById('view-notices').innerText = data.notices || "";
            document.getElementById('view-al-lim').innerText = data.alLim || "";
            document.getElementById('view-safety').innerText = data.safety || "";
            document.getElementById('view-birthday').innerText = data.birthday || "";

            // 시간표 렌더링
            const ttCon = document.getElementById('view-timetable');
            ttCon.innerHTML = "";
            if(data.timetable) {
                data.timetable.split('\n').forEach(line => {
                    if(!line.trim()) return;
                    const parts = line.split(':');
                    const subjectPart = parts[0] || "";
                    const goalPart = parts[1] || "";
                    
                    const match = subjectPart.match(/(\d교시)\s*(.*)/);
                    const num = match ? match[1] : "";
                    const sub = match ? match[2] : subjectPart;

                    ttCon.innerHTML += `
                        <div class="timetable-row">
                            <div class="tt-num">${num}</div>
                            <div class="tt-subject">${sub}</div>
                            <div class="tt-goal">${goalPart}</div>
                        </div>
                    `;
                });
            }
        }

        // ✏️ 수정 모달 제어
        function openEditModal() {
            boardRef.once('value').then(snap => {
                const data = snap.val() || {};
                document.getElementById('be-date').value = data.date || "";
                document.getElementById('be-morning').value = data.morning || "";
                document.getElementById('be-duty-nums').value = data.dutyNums || "";
                document.getElementById('be-duty-tasks').value = data.dutyTasks || defaultDutyTask;
                document.getElementById('be-timetable').value = data.timetable || "";
                document.getElementById('be-notices').value = data.notices || "";
                document.getElementById('be-al-lim').value = data.alLim || "";
                document.getElementById('be-safety').value = data.safety || "";
                document.getElementById('be-birthday').value = data.birthday || "";
                document.getElementById('edit-modal').style.display = 'block';
            });
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        // 🪄 자동 완성 (요일별)
        function autoFillByDay() {
            const today = new Date();
            const days = ['일','월','화','수','목','금','토'];
            const dayStr = days[today.getDay()];
            
            document.getElementById('be-date').value = `${today.getMonth()+1}월 ${today.getDate()}일 ${dayStr}요일 ☀️ 맑음`;
            
            if(dayDefaults[dayStr]) {
                document.getElementById('be-morning').value = dayDefaults[dayStr].morning;
                document.getElementById('be-safety').value = dayDefaults[dayStr].safety;
                document.getElementById('be-timetable').value = dayDefaults[dayStr].timetable;
            }

            // 당번 로테이션 (24명 기준 2명씩)
            db.ref('rooms/' + currentRoom + '/settings/lastDutyIndex').once('value').then(snap => {
                let lastIdx = snap.val() || 0;
                let n1 = (lastIdx % 24) + 1;
                let n2 = ((lastIdx + 1) % 24) + 1;
                document.getElementById('be-duty-nums').value = `${n1}번, ${n2}번`;
                window.tempNextIdx = lastIdx + 2;
            });
        }

        // 💾 저장
        function saveDashboardData() {
            const data = {
                date: document.getElementById('be-date').value,
                morning: document.getElementById('be-morning').value,
                dutyNums: document.getElementById('be-duty-nums').value,
                dutyTasks: document.getElementById('be-duty-tasks').value,
                timetable: document.getElementById('be-timetable').value,
                notices: document.getElementById('be-notices').value,
                alLim: document.getElementById('be-al-lim').value,
                safety: document.getElementById('be-safety').value,
                birthday: document.getElementById('be-birthday').value
            };
            boardRef.set(data);
            if(window.tempNextIdx) db.ref('rooms/' + currentRoom + '/settings/lastDutyIndex').set(window.tempNextIdx);
            closeEditModal();
        }

        // ⏱️ 타이머 로직
        let timerSeconds = 0;
        let timerInterval;
        function toggleTimerBox() {
            const box = document.getElementById('timer-box');
            box.style.display = (box.style.display === 'block') ? 'none' : 'block';
        }
        function setTimer(m) {
            clearInterval(timerInterval);
            timerSeconds = m * 60;
            updateTimerDisplay();
            document.getElementById('timer-toggle-btn').innerText = "시작";
        }
        function updateTimerDisplay() {
            const min = Math.floor(timerSeconds / 60);
            const sec = timerSeconds % 60;
            document.getElementById('timer-display').innerText = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
        }
        function toggleTimer() {
            const btn = document.getElementById('timer-toggle-btn');
            if(btn.innerText === "시작") {
                if(timerSeconds <= 0) {
                    const custom = parseInt(document.getElementById('custom-timer-input').value);
                    if(custom > 0) timerSeconds = custom * 60;
                    else return;
                }
                btn.innerText = "정지";
                timerInterval = setInterval(() => {
                    if(timerSeconds > 0) {
                        timerSeconds--;
                        updateTimerDisplay();
                    } else {
                        clearInterval(timerInterval);
                        new Audio('https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3').play();
                        btn.innerText = "시작";
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
                btn.innerText = "시작";
            }
        }
    </script>
</body>
</html>
